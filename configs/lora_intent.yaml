# MiniMind LoRA SFT config for session intent generation
# Reference: configs/lora_tag.yaml for original format

model:
  name: MiniMind
  size: 64M  # 64M-100M range
  max_seq_len: 512  # Sessions may need more tokens than tags

lora:
  name: lora_intent
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules: [q_proj, v_proj]

train:
  lr: 0.0001
  batch_size: 16
  epochs: 5
  warmup_steps: 50
  logging_steps: 10
  save_steps: 100
  output_dir: ./checkpoints/intent_lora

data:
  train_file: ./data/intent_sft/train.jsonl
  val_file: ./data/intent_sft/val.jsonl

model_path: ./model  # MiniMind base model path

intent:
  # System prompt key for the intent generation task
  system_prompt_key: "intent_analysis"
  # Max tokens to generate for intent JSON output
  max_new_tokens: 256
  # Generation temperature for evaluation
  temperature: 0.1
